name: ScummVM AARCH64 Release Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Select Build Type'
        required: true
        default: 'both'
        type: choice
        options:
          - 'standard'    # Option 1: Patch 000 only
          - 'korean'      # Option 2: All patches (000-003)
          - 'both'        # Option 3: Build both standard and korean

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # CRITICAL: Convert repository name to lowercase for Docker compatibility
      - name: 1.1. Prepare Repository Name
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: 2. Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 3. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 4. Login to GHCR (GitHub Container Registry)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Build and Push Environment Image
        # Save build environment to GHCR to avoid repetitive dependency installation
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/scummvm-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 6. Restore ccache
        # Persist compilation cache to overcome 6-hour GitHub Actions timeout
        uses: actions/cache@v4
        with:
          path: .ccache
          key: scummvm-ccache-${{ github.ref }}-${{ github.sha }}
          restore-keys: |
            scummvm-ccache-${{ github.ref }}-
            scummvm-ccache-

      - name: 7. Execution Logic (Build & Package)
        run: |
          # Function to handle patching and multi-core compilation
          run_build() {
            local label=$1
            local mode=$2
            local out_dir="OUT_DIR_${label}"
            
            echo "Starting build process for: ${label}"

            docker run --rm \
              -v ${{ github.workspace }}:/work \
              -v ${{ github.workspace }}/.ccache:/root/.ccache \
              -e CCACHE_DIR=/root/.ccache \
              ghcr.io/${{ env.REPO_LOWER }}/scummvm-builder:latest /bin/bash -c "
                cd /work
                # Use cached source if exists, otherwise clone
                [ -d src ] || git clone -b branch-2026-1-0 --recurse-submodules https://github.com/scummvm/scummvm.git src
                cd src
                
                # Clean source state to prevent patch conflicts
                git reset --hard
                find . -type f -name '*.[ch]*' | xargs sed -i 's/\r$//'

                # [Patch Group 1] Mandatory (000-cacert for SSL/Networking)
                echo 'Applying mandatory patch 000...'
                git apply ../patches/scummvm-000-cacert-env.patch || true

                # [Patch Group 2] Korean Engines (001, 002, 003)
                if [ \"$mode\" == \"full\" ]; then
                  echo 'Applying Korean patches 001, 002, 003...'
                  git apply ../patches/scummvm-001-british-korean.patch || true
                  git apply ../patches/scummvm-002-ultima8-korean.patch || true
                  git apply ../patches/scummvm-003-sci-add-korean.patch || true
                fi

                # Configure with optimizations and ccache enabled
                ./configure --backend=sdl --enable-optimizations --opengl-mode=gles2 \
                  --enable-vkeybd --disable-debug --enable-release --enable-fluidsynth \
                  --enable-all-engines --enable-ccache
                
                # Use all available CPU cores for compilation
                make -j$(nproc)
                strip scummvm

                # Create spruceOS compatible directory structure
                mkdir -p ../${out_dir}/LICENSES ../${out_dir}/Theme ../${out_dir}/Extra/shaders ../${out_dir}/libs
                cp -f scummvm ../${out_dir}/
                cp -f LICENSES/* ../${out_dir}/LICENSES/
                cp -f gui/themes/*.dat gui/themes/*.zip ../${out_dir}/Theme/
                cp -f dists/networking/wwwroot.zip ../${out_dir}/Theme/
                cp -f -r dists/engine-data/* ../${out_dir}/Extra/
                cp -f backends/vkeybd/packs/*.zip ../${out_dir}/Extra/
                cp -f dists/soundfonts/Roland_SC-55.sf2 ../${out_dir}/Extra/
                
                # Collect GLSL shaders
                find engines/ -type f \( -name '*.fragment' -o -name '*.vertex' \) -exec cp -f {} ../${out_dir}/Extra/shaders/ \;

                # Automatic shared library extraction for portable runtime
                for lib in \$(readelf -d ../${out_dir}/scummvm | grep NEEDED | awk -F'[' '{print \$2}' | awk -F']' '{print \$1}'); do
                  LIB_PATH=\$(find /usr/lib/aarch64-linux-gnu /usr/lib -name \"\$lib\" -print -quit)
                  [ -n \"\$LIB_PATH\" ] && cp -L \"\$LIB_PATH\" \"../${out_dir}/libs/\"
                done
              "
          }

          # Execute builds based on user input
          TYPE="${{ github.event.inputs.build_type }}"
          if [ "$TYPE" == "standard" ] || [ "$TYPE" == "both" ]; then
            run_build "Standard" "basic"
          fi
          if [ "$TYPE" == "korean" ] || [ "$TYPE" == "both" ]; then
            # Second build is extremely fast due to ccache
            run_build "Korean" "full"
          fi

      - name: 8. Create Final Archives (7-Zip)
        run: |
          sudo apt-get install -y p7zip-full
          if [ -d "OUT_DIR_Standard" ]; then
            7z a -t7z -m0=lzma2 -mx=9 scummvm_AARCH64_standard.7z ./OUT_DIR_Standard/*
          fi
          if [ -d "OUT_DIR_Korean" ]; then
            7z a -t7z -m0=lzma2 -mx=9 scummvm_AARCH64_korean.7z ./OUT_DIR_Korean/*
          fi

      - name: 9. Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scummvm_AARCH64_standard.7z
            scummvm_AARCH64_korean.7z
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
