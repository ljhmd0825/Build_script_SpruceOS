name: ScummVM AARCH64 Strict Build (No-Symlink Libs)

on:
  workflow_dispatch: # Manual trigger for mobile/tablet

jobs:
  build-scummvm:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:20.04 # Match target environment

    steps:
      - name: Checkout ScummVM (branch-2026-1-0)
        run: |
          # Use your exact clone command with submodules
          git clone -b branch-2026-1-0 --recurse-submodules -j$(nproc) https://github.com/scummvm/scummvm.git source

      - name: Checkout Your Patches
        uses: actions/checkout@v4
        with:
          path: build-scripts

      - name: Setup Multi-arch and Cross-Tools
        run: |
          # Prepare environment for aarch64 cross-compilation
          dpkg --add-architecture arm64
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential pkg-config git python3 wget curl p7zip-full cmake \
            g++-aarch64-linux-gnu gcc-aarch64-linux-gnu

      - name: Build Custom SDL 2.26.2 (Source)
        run: |
          # Build SDL 2.26.2 as instructed with --prefix=/usr
          wget https://github.com/libsdl-org/SDL/archive/refs/tags/release-2.26.2.tar.gz
          tar -xzf release-2.26.2.tar.gz
          cd SDL-release-2.26.2
          ./configure --host=aarch64-linux-gnu --prefix=/usr \
            --disable-video-x11 --disable-pulseaudio --disable-esd
          make -j$(nproc)
          make install

      - name: Build FluidSynth v2.3.4 (Strict v2.3.4)
        run: |
          # Build FluidSynth from source with exact cmake options
          git clone --recursive https://github.com/FluidSynth/fluidsynth.git
          cd fluidsynth && git checkout v2.3.4
          mkdir -p build && cd build
          cmake -DCMAKE_SYSTEM_NAME=Linux -DCMAKE_SYSTEM_PROCESSOR=aarch64 \
            -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc \
            -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++ \
            -DCMAKE_INSTALL_PREFIX=/usr -DLIB_SUFFIX="" ..
          make -j$(nproc)
          make install

      - name: Apply All Patches (000 to 003)
        run: |
          cd source
          PATCH_DIR="../build-scripts/patches"
          # Apply patches in numerical order (000 -> 003)
          for patchfile in $(ls $PATCH_DIR/*.patch | sort); do
            filename=$(basename "$patchfile")
            if [[ "$filename" == "scummvm-002-ultima8-korean.patch" ]]; then
              git apply --whitespace=fix "$patchfile" || git apply --ignore-whitespace "$patchfile"
            else
              git apply "$patchfile" || patch -p1 < "$patchfile"
            fi
          done

      - name: Configure and Build ScummVM
        run: |
          cd source
          export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig:/usr/lib/pkgconfig
          # Capture full configure summary as requested
          ./configure \
            --host=aarch64-linux-gnu --backend=sdl --enable-optimizations \
            --opengl-mode=gles2 --enable-vkeybd --disable-debug \
            --enable-release --enable-fluidsynth --enable-all-engines \
            --with-sdl-prefix=/usr --extra-cflags="-I/usr/include" --extra-ldflags="-L/usr/lib" 2>&1 | tee ../configure_summary.txt
          make -j$(nproc)

      - name: Packaging - Resolve, Copy and Rename (Strict OUT_DIR Logic)
        run: |
          # 1. Create the exact OUT_DIR structure you provided
          mkdir -p OUT_DIR/LICENSES OUT_DIR/Theme OUT_DIR/Extra OUT_DIR/Extra/shaders OUT_DIR/libs
          
          cd source
          # Copy binary and strip
          cp -f scummvm ../OUT_DIR/
          aarch64-linux-gnu-strip ../OUT_DIR/scummvm
          
          # Copy requested log and summary files
          cp ../configure_summary.txt ../OUT_DIR/
          cp config.log ../OUT_DIR/

          # 2. Detailed copy operations from your script
          cp -f LICENSES/* ../OUT_DIR/LICENSES/
          cp -f dists/soundfonts/COPYRIGHT.Roland_SC-55 ../OUT_DIR/LICENSES/
          cp -f gui/themes/*.dat gui/themes/*.zip ../OUT_DIR/Theme/
          cp -f dists/networking/wwwroot.zip ../OUT_DIR/Theme/
          cp -f -r dists/engine-data/* ../OUT_DIR/Extra/
          
          # Cleanup Extra folder as instructed
          rm -rf ../OUT_DIR/Extra/patches ../OUT_DIR/Extra/testbed-audiocd-files
          rm -f ../OUT_DIR/Extra/README ../OUT_DIR/Extra/*.mk ../OUT_DIR/Extra/*.sh
          
          # Additional assets
          cp -f backends/vkeybd/packs/vkeybd_default.zip ../OUT_DIR/Extra/
          cp -f backends/vkeybd/packs/vkeybd_small.zip ../OUT_DIR/Extra/
          cp -f dists/soundfonts/Roland_SC-55.sf2 ../OUT_DIR/Extra/
          
          # Find and copy shaders
          find engines/ -type f \( -name "*.fragment" -o -name "*.vertex" \) -exec cp -f {} "../OUT_DIR/Extra/shaders/" \;

          # 3. Resolve dependencies and hard-copy shared libs (No-Symlink)
          echo "Processing shared library dependencies..."
          NEEDED_LIBS=$(aarch64-linux-gnu-readelf -d ../OUT_DIR/scummvm | grep NEEDED | awk -F'[' '{print $2}' | awk -F']' '{print $1}')
          for lib in $NEEDED_LIBS; do
            LIB_PATH=$(find /usr/lib/aarch64-linux-gnu /usr/lib -name "$lib" -print -quit)
            if [ -n "$LIB_PATH" ]; then
              echo "Mapping: $lib -> Copying from $LIB_PATH"
              cp -L "$LIB_PATH" "../OUT_DIR/libs/$lib"
            fi
          done

      - name: Final Ultra 7z Compression
        run: |
          # Ultra compression options as instructed
          7z a -t7z -m0=lzma2 -mx=9 -md=128m -mfb=273 -ms=on scummvm_Final.7z ./OUT_DIR/*

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ScummVM-AARCH64-Ready
          path: scummvm_Final.7z
