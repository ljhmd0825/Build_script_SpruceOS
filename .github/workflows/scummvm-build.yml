name: ScummVM AARCH64 Release Build

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 2. Set up QEMU for ARM64 Emulation
        # Required to run and build ARM64 images on x86_64 runners
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 3. Set up Docker Buildx
        # Enables multi-arch container builds
        uses: docker/setup-buildx-action@v3

      - name: 4. Build Custom Build-Environment Image
        # This step builds a Docker image containing all dependencies from your guide
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: false
          load: true
          tags: scummvm-builder:latest

      - name: 5. Compile ScummVM and Package
        # Run the actual build process inside the ARM64 container
        run: |
          docker run --rm -v ${{ github.workspace }}:/work scummvm-builder:latest /bin/bash -c "
            cd /work
            
            # Clone ScummVM Source
            git clone -b branch-2026-1-0 --recurse-submodules https://github.com/scummvm/scummvm.git src
            cd src

            # [Patching] Apply custom patches (e.g., SSL/cacert environment)
            # Fix line endings (CRLF to LF) to ensure patches apply correctly
            find . -type f -name '*.[ch]*' | xargs sed -i 's/\r$//'
            if [ -d \"../patches\" ]; then
              for p in ../patches/*.patch; do
                echo \"Applying: \$p\"
                git apply --ignore-whitespace \"\$p\" || patch -p1 < \"\$p\"
              done
            fi

            # [Build] Configure with AARCH64 optimized flags from your guide
            ./configure --backend=sdl --enable-optimizations --opengl-mode=gles2 \
              --enable-vkeybd --disable-debug --enable-release --enable-fluidsynth \
              --enable-all-engines 2>&1 | tee ../configure_summary.txt
            
            make -j$(nproc)
            strip scummvm

            # [Packaging] Create strict spruceOS-compatible structure (OUT_DIR)
            mkdir -p ../OUT_DIR/LICENSES ../OUT_DIR/Theme ../OUT_DIR/Extra/shaders ../OUT_DIR/libs
            cp -f scummvm ../OUT_DIR/
            cp ../configure_summary.txt ../OUT_DIR/
            cp config.log ../OUT_DIR/
            cp -f LICENSES/* ../OUT_DIR/LICENSES/
            cp -f gui/themes/*.dat gui/themes/*.zip ../OUT_DIR/Theme/
            cp -f dists/networking/wwwroot.zip ../OUT_DIR/Theme/
            cp -f -r dists/engine-data/* ../OUT_DIR/Extra/
            cp -f backends/vkeybd/packs/*.zip ../OUT_DIR/Extra/
            cp -f dists/soundfonts/Roland_SC-55.sf2 ../OUT_DIR/Extra/
            
            # Extract Shaders (Requirement)
            find engines/ -type f \( -name \"*.fragment\" -o -name \"*.vertex\" \) -exec cp -f {} \"../OUT_DIR/Extra/shaders/\" \;

            # Extract Shared Libraries (Strictly for spruceOS runtime)
            for lib in \$(readelf -d ../OUT_DIR/scummvm | grep NEEDED | awk -F'[' '{print \$2}' | awk -F']' '{print \$1}'); do
              LIB_PATH=\$(find /usr/lib/aarch64-linux-gnu /usr/lib -name \"\$lib\" -print -quit)
              [ -n \"\$LIB_PATH\" ] && cp -L \"\$LIB_PATH\" \"../OUT_DIR/libs/\"
            done
          "

      - name: 6. Create Artifact Archive
        # Use 7z with your specific ultra-compression settings
        run: |
          sudo apt-get install -y p7zip-full
          7z a -t7z -m0=lzma2 -mx=9 -md=128m -mfb=273 -ms=on scummvm_AARCH64_spruce.7z ./OUT_DIR/*

      - name: 7. Upload to GitHub Release
        # Automatically uploads the 7z when a version tag (v*) is pushed
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: scummvm_AARCH64_spruce.7z
          body: "ScummVM AARCH64 build for spruceOS. Build log attached in configure_summary.txt."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
