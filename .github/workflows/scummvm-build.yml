name: ScummVM AARCH64 Release Build

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Select Build Type'
        required: true
        default: 'both'
        type: choice
        options:
          - 'standard'
          - 'korean'
          - 'both'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    permissions:
      packages: write
      contents: write
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: 1.1. Prepare Environment Variables
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: 2. Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 3. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 4. Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Build Environment Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/scummvm-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 6. Restore ccache from Branch
        run: |
          mkdir -p .ccache
          git fetch origin build-cache:build-cache || true
          git checkout build-cache -- ccache.tar.gz || true
          if [ -f ccache.tar.gz ]; then
            tar -xzf ccache.tar.gz
            echo "Successfully restored ccache from branch"
          fi

      - name: 7. Build and Extract Logic
        run: |
          chmod +x ./extract_scummvm.sh
          chmod -R 777 .ccache
          
          run_compile() {
            local label=$1
            local mode=$2
            docker run --rm \
              --platform linux/arm64 \
              -v ${{ github.workspace }}:/work \
              -v ${{ github.workspace }}/.ccache:/root/.ccache \
              -e CCACHE_DIR=/root/.ccache \
              -e CCACHE_BASEDIR=/work \
              ghcr.io/${{ env.REPO_LOWER }}/scummvm-builder:latest /bin/bash -c "
                export PATH='/usr/lib/ccache:$PATH'
                cd /work
                [ -d src ] || git clone -b branch-2026-1-0 --recurse-submodules https://github.com/scummvm/scummvm.git src
                cd src
                git reset --hard
                git apply ../patches/scummvm-000-cacert-env.patch || true
                if [ \"$mode\" == \"full\" ]; then
                  git apply ../patches/scummvm-001-british-korean.patch || true
                  git apply ../patches/scummvm-002-ultima8-korean.patch || true
                  git apply ../patches/scummvm-003-sci-add-korean.patch || true
                fi
                ccache -M 5G
                ./configure --backend=sdl --enable-optimizations --opengl-mode=gles2 \
                  --enable-vkeybd --disable-debug --enable-release --enable-fluidsynth \
                  --enable-all-engines
                make -j\$(nproc) CC='ccache gcc' CXX='ccache g++'
                strip scummvm
              "
          }

          run_extract() {
            local label=$1
            docker run --rm \
              --platform linux/arm64 \
              -v ${{ github.workspace }}:/work \
              ghcr.io/${{ env.REPO_LOWER }}/scummvm-builder:latest /bin/bash /work/extract_scummvm.sh "$label" "${{ env.BUILD_DATE }}"
          }

          TYPE="${{ github.event.inputs.build_type }}"
          if [ "$TYPE" == "standard" ] || [ "$TYPE" == "both" ]; then
            run_compile "Standard" "basic"
            run_extract "Standard"
          fi
          if [ "$TYPE" == "korean" ] || [ "$TYPE" == "both" ]; then
            run_compile "Korean" "full"
            run_extract "Korean"
          fi

      - name: 8. Save ccache to Branch
        if: always()
        run: |
          sudo chown -R $USER:$USER .ccache
          if [ -d ".ccache" ]; then
            # Create archive in a safe location
            tar -czf /tmp/ccache.tar.gz .ccache
            
            git config user.name "github-actions"
            git config user.email "action@github.com"
            
            # Fetch and switch to build-cache branch
            git fetch origin build-cache:build-cache || git checkout --orphan build-cache
            git checkout build-cache
            
            # Keep only the cache file
            rm -rf * || true
            mv /tmp/ccache.tar.gz ./
            
            git add ccache.tar.gz
            git commit -m "Update ccache: ${{ env.BUILD_DATE }} (Run #${{ github.run_number }})" || exit 0
            git push origin build-cache --force
          else
            echo "No ccache directory found to save"
          fi

      - name: 9. Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "scummvm-${{ env.BUILD_DATE }}-${{ github.run_number }}"
          name: "ScummVM Build ${{ env.BUILD_DATE }} (#${{ github.run_number }})"
          files: "*.7z"
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
