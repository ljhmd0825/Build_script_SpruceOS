name: AdvanceMAME AARCH64 Build

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Target Commit Hash'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set Lowercase Repository Name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: 3. Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 4. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 5. Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 6. Build and Push Image (Only if Dockerfile changed)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/scummvm-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 7. Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: advmame-ccache-${{ github.ref }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            advmame-ccache-${{ github.ref }}-
            advmame-ccache-

      - name: 8. Execution Build Phase
        timeout-minutes: 300 
        run: |
          mkdir -p .ccache
          chmod -R 777 .ccache
          target_hash="${{ github.event.inputs.commit_hash }}"
          
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/work \
            -v ${{ github.workspace }}/.ccache:/root/.ccache \
            -e CCACHE_DIR=/root/.ccache \
            -e CCACHE_COMPILERCHECK=content \
            ghcr.io/${{ env.REPO_LOWER }}/scummvm-builder:latest /bin/bash -c "
              cd /work
              [ -d advmame ] || git clone https://github.com/amadvance/advancemame.git advmame
              cd advmame
              
              git reset --hard
              [ -n \"$target_hash\" ] && git checkout \"$target_hash\" || git pull origin master
              
              mkdir -p m4
              touch NEWS README AUTHORS ChangeLog
              aclocal -I m4 && automake --add-missing --copy --foreign || true
              autoheader && autoconf
              
              git apply ../patches/iremga20_fix.patch || true

              ccache -M 5G
              ccache -z

              ./configure
              make -j$(nproc) TARGET=mame CC='ccache gcc' CXX='ccache g++'
              
              ccache -s
              
              mkdir -p ../ADV_OUT
              cp obj/mame/linux/blend/advmame ../ADV_OUT/advmame_AARCH64
              
              chown -R 1001:127 /root/.ccache || true
            "

      - name: 9. Save ccache (Always)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: advmame-ccache-${{ github.ref }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: 10. Archive & Upload
        if: success()
        run: |
          sudo apt-get install -y p7zip-full
          7z a -t7z -mx=9 advmame_AARCH64.7z ./ADV_OUT/*
          
      - name: 11. Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: "*.7z"
          tag_name: "v${{ github.run_id }}-${{ github.run_attempt }}"
          name: "AdvanceMAME AARCH64 Build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
