name: AdvanceMAME AARCH64 Build

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Target Commit Hash'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: read
      contents: write
    
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set Lowercase Repository Name
        run: echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: 3. Set up QEMU for ARM64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: 4. Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 5. Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: advmame-ccache-${{ github.ref }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            advmame-ccache-${{ github.ref }}-
            advmame-ccache-

      - name: 6. Execution Build Phase
        timeout-minutes: 300 
        run: |
          target_hash="${{ github.event.inputs.commit_hash }}"
          
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/work \
            -v ${{ github.workspace }}/.ccache:/root/.ccache \
            -e CCACHE_DIR=/root/.ccache \
            ghcr.io/${{ env.REPO_LOWER }}/scummvm-builder:latest /bin/bash -c "
              cd /work
              apt-get update && apt-get install -y --no-install-recommends \
                libexpat1-dev libasound2-dev libslang2-dev libncurses5-dev libncursesw5-dev
              
              [ -d advmame ] || git clone https://github.com/amadvance/advancemame.git advmame
              cd advmame
              
              git reset --hard
              [ -n \"$target_hash\" ] && git checkout \"$target_hash\" || git pull origin master
              
              mkdir -p m4
              touch NEWS README AUTHORS ChangeLog
              aclocal -I m4
              automake --add-missing --copy --foreign || true
              autoheader
              autoconf
              
              git apply ../patches/iremga20_fix.patch || true

              ./configure
              make -j$(nproc) TARGET=mame
              
              mkdir -p ../ADV_OUT
              cp obj/mame/linux/blend/advmame ../ADV_OUT/advmame_AARCH64
            "

      - name: 7. Save ccache (Always)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: advmame-ccache-${{ github.ref }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: 8. Archive & Upload
        if: success()
        run: |
          sudo apt-get install -y p7zip-full
          7z a -t7z -mx=9 advmame_AARCH64.7z ./ADV_OUT/*
          
      - name: 9. Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          files: "*.7z"
          tag_name: "v${{ github.run_id }}-${{ github.run_attempt }}"
          name: "AdvanceMAME AARCH64 Build"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
