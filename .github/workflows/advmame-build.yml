name: AdvanceMAME AARCH64 Build

on:
  workflow_dispatch:
    inputs:
      commit_hash:
        description: 'Target Commit Hash'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment Setup
        run: |
          echo "REPO_LOWER=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date +'%Y%m%d')" >> $GITHUB_ENV

      - name: QEMU & Buildx Setup
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Docker Buildx Setup
        uses: docker/setup-buildx-action@v3

      - name: GHCR Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Builder Image Update
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ env.REPO_LOWER }}/scummvm-builder:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Restore ccache
        uses: actions/cache/restore@v4
        with:
          path: .ccache
          key: advmame-ccache-${{ github.ref }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            advmame-ccache-${{ github.ref }}-
            advmame-ccache-

      - name: Build Execution
        timeout-minutes: 300 
        run: |
          mkdir -p .ccache
          chmod -R 777 .ccache
          target_hash="${{ github.event.inputs.commit_hash }}"
          
          docker run --rm \
            --platform linux/arm64 \
            -v ${{ github.workspace }}:/work \
            -v ${{ github.workspace }}/.ccache:/root/.ccache \
            -e CCACHE_DIR=/root/.ccache \
            -e CCACHE_COMPILERCHECK=content \
            ghcr.io/${{ env.REPO_LOWER }}/scummvm-builder:latest /bin/bash -c "
              cd /work
              [ -d advmame ] || git clone https://github.com/amadvance/advancemame.git advmame
              cd advmame
              
              git reset --hard
              [ -n \"$target_hash\" ] && git checkout \"$target_hash\" || git pull origin master
              
              aclocal -I m4 && automake --add-missing --copy --foreign || true
              autoheader && autoconf
              ./configure
              
              git apply ../patches/iremga20_fix.patch || true

              ccache -M 5G
              ccache -z

              make -j$(nproc) TARGET=mame V=1 CC='ccache gcc' CXX='ccache g++'
              
              ccache -s
              
              mkdir -p ../ADV_OUT
              cp obj/mame/linux/blend/advmame ../ADV_OUT/advmame_AARCH64
              
              cd ../ADV_OUT
              7z a -t7z -mx=9 ../advmame_AARCH64.7z ./*
              
              chown -R 1001:127 /root/.ccache || true
              cd /work
              chown 1001:127 advmame_AARCH64.7z
            "

      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .ccache
          key: advmame-ccache-${{ github.ref }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "advmame-${{ env.BUILD_DATE }}-${{ github.run_number }}"
          name: "AdvanceMAME Build ${{ env.BUILD_DATE }} (#${{ github.run_number }})"
          files: "advmame_AARCH64.7z"
          append_body: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
