name: Build scummvm.64

on:
  workflow_dispatch:
    inputs:
      scummvm_version:
        description: 'ScummVM version tag'
        default: 'v2.8.1'
      build_type:
        description: 'Select build type (64: Standard, 64K: Korean)'
        required: true
        default: '64'
        type: choice
        options:
          - '64'
          - '64K'
      debug_enabled:
        description: 'Enable step debug logging'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      scummvm_version:
        type: string
        default: 'v2.8.1'
      build_type:
        type: string
        default: '64'

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/scummvm-builder-64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure release exists
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_TAG: "${{ github.event.inputs.scummvm_version }}-${{ github.ref_name }}"
        run: |
          echo "Target Release: $TARGET_TAG"
          gh release view "$TARGET_TAG" >/dev/null 2>&1 || \
            gh release create "$TARGET_TAG" \
              --target "${{ github.ref_name }}" \
              --title "$TARGET_TAG" \
              --notes "ScummVM binaries for $TARGET_TAG" \
            || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.64
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache-${{ github.ref_name }}
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache-${{ github.ref_name }},mode=max

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: ccache-64-${{ github.event.inputs.scummvm_version }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            ccache-64-${{ github.event.inputs.scummvm_version }}-${{ github.ref_name }}-
            ccache-64-${{ github.ref_name }}-

      - name: Build ScummVM
        run: |
          mkdir -p output ccache
          docker run --rm \
            -e SCUMMVM_VERSION=${{ github.event.inputs.scummvm_version }} \
            -e BUILD_TYPE=${{ github.event.inputs.build_type || '64' }} \
            -v ${{ github.workspace }}/output:/output \
            -v ${{ github.workspace }}/ccache:/ccache \
            ${{ env.IMAGE }}:${{ github.ref_name }}

      - name: Upload binary
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_TAG: "${{ github.event.inputs.scummvm_version }}-${{ github.ref_name }}"
        run: |
          FILE_PATH=$(ls output/scummvm.*.7z | head -n 1)
          
          if [ -f "$FILE_PATH" ]; then
            echo "Uploading $FILE_PATH to release $TARGET_TAG..."
            gh release upload "$TARGET_TAG" "$FILE_PATH" --clobber
          else
            echo "Error: Generated 7z file not found."
            exit 1
          fi
