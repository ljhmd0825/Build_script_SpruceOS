name: Build scummvm.64

on:
  workflow_dispatch:
    inputs:
      scummvm_version:
        description: 'ScummVM version tag'
        default: 'v2026.1.0'
      # --- START OF MODIFICATION: Added Build Type selection ---
      build_type:
        description: 'Select build type (64: Standard, 64K: Korean)'
        required: true
        default: '64'
        type: choice
        options:
          - '64'
          - '64K'
      # --- END OF MODIFICATION ---
      debug_enabled:
        description: 'Enable step debug logging'
        required: false
        type: boolean
        default: false
  workflow_call:
    inputs:
      scummvm_version:
        type: string
        default: 'v2026.1.0'
      # --- START OF MODIFICATION: Support Build Type in call ---
      build_type:
        type: string
        default: '64'
      # --- END OF MODIFICATION ---

permissions:
  contents: write
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/scummvm-builder-64

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Ensure latest release exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="latest"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" \
              --target "${{ github.ref_name }}" \
              --title "Latest Build" \
              --notes "ScummVM binaries for spruce" \
            || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.64
          push: true
          tags: ${{ env.IMAGE }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE }}:cache
          cache-to: type=registry,ref=${{ env.IMAGE }}:cache,mode=max

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ccache
          key: ccache-64-${{ github.event.inputs.scummvm_version || 'v2026.1.0' }}-${{ github.sha }}
          restore-keys: |
            ccache-64-${{ github.event.inputs.scummvm_version || 'v2026.1.0' }}-
            ccache-64-

      - name: Build ScummVM
        # --- START OF MODIFICATION: Pass BUILD_TYPE to Docker ---
        run: |
          mkdir -p output ccache
          docker run --rm \
            -e SCUMMVM_VERSION=${{ github.event.inputs.scummvm_version || 'v2026.1.0' }} \
            -e BUILD_TYPE=${{ github.event.inputs.build_type || '64' }} \
            -v ${{ github.workspace }}/output:/output \
            -v ${{ github.workspace }}/ccache:/ccache \
            ${{ env.IMAGE }}:latest
        # --- END OF MODIFICATION ---

      - name: Upload binary
        env:
          GH_TOKEN: ${{ github.token }}
        # --- START OF MODIFICATION: Dynamic filename matching ---
        run: |
          # Use wildcard to find the generated 7z file (e.g., scummvm.64.0330.7z)
          FILE_PATH=$(ls output/scummvm.*.7z | head -n 1)
          
          if [ -f "$FILE_PATH" ]; then
            echo "Uploading $FILE_PATH to release..."
            gh release upload "latest" "$FILE_PATH" --clobber
          else
            echo "Error: Generated 7z file not found in output directory."
            exit 1
          fi
        # --- END OF MODIFICATION ---